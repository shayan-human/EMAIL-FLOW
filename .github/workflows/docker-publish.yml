name: Build & Push to Docker Hub

on:
  push:
    branches: ["main"]
  release:
    types: [published]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./campaign-scheduler
          dockerfile: ./campaign-scheduler/Dockerfile
          push: true
          tags: |
            emailfloww/email-flow-frontend:latest
            emailfloww/email-flow-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./campaign-backend
          dockerfile: ./campaign-backend/Dockerfile
          push: true
          tags: |
            emailfloww/email-flow-backend:latest
            emailfloww/email-flow-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
