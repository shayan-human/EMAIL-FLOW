services:
  postgres:
    image: postgres:16-alpine
    container_name: emailflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-emailflow}
      POSTGRES_USER: ${POSTGRES_USER:-emailflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-emailflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: emailfloww/email-flow-backend:latest
    container_name: emailflow-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-emailflow}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-emailflow}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://localhost:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      NODE_ENV: production
      PORT: 3001
      CRON_SCHEDULE: ${CRON_SCHEDULE:-*/5 * * * *}
      ALLOWED_ORIGINS: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "3001:3001"

  frontend:
    image: emailfloww/email-flow-frontend:latest
    container_name: emailflow-frontend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-emailflow}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-emailflow}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:3001}
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  postgres_data:
